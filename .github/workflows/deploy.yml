name: Build Phat Gorrilla Frontend

on:
  push:
    branches: [ master, main ]
    paths:
      - 'PowerGorilla/frontend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'PowerGorilla/frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    name: Build Expo Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PowerGorilla/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: PowerGorilla/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit
        run: npm run audit:security

      - name: Build Expo web
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: phat-gorrilla-web-build
          path: PowerGorilla/frontend/dist
