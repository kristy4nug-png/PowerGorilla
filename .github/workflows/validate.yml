name: Validate PowerGorilla

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run validation
        shell: pwsh
        run: |
          $RequiredFolders = @(
            ".\PowerGorilla\app",
            ".\PowerGorilla\data",
            ".\PowerGorilla\data\imports",
            ".\PowerGorilla\data\processed",
            ".\PowerGorilla\data\icons",
            ".\PowerGorilla\logs",
            ".\PowerGorilla\reports",
            ".\PowerGorilla\backups",
            ".\PowerGorilla\docs"
          )

          foreach ($Folder in $RequiredFolders) {
            New-Item -ItemType Directory -Force -Path $Folder | Out-Null
          }

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\ci-audio-design.csv" -Encoding UTF8 -Value @(
            "Name,Category,Type,LaunchUrl,Description,IconExtracted,SafeToLaunch,Workflow",
            "Audacity,Audio,desktop,,Audio editor,true,true,Audacity + Blender",
            "Blender,Design,desktop,,3D creation suite,true,true,Audacity + Blender"
          )

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\ci-dev-frontend.csv" -Encoding UTF8 -Value @(
            "Name,Category,Type,LaunchUrl,Description,IconExtracted,SafeToLaunch,Workflow",
            "GitHub,Development,online,https://github.com,Code hosting,true,true,GitHub + Vercel",
            "Vercel,Frontend,online,https://vercel.com,Frontend hosting,true,true,GitHub + Vercel"
          )

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\ci-workflow-samples.csv" -Encoding UTF8 -Value @(
            "Name,Category,Type,LaunchUrl,Description,IconExtracted,SafeToLaunch,Workflow",
            "Supabase,Backend,online,https://supabase.com,Backend platform,true,true,Supabase + Ollama + JSON",
            "Ollama,AI,local,http://localhost:11434,Local AI runtime,true,true,Supabase + Ollama + JSON",
            "age,Security,desktop,,Encryption tool,true,true,age + BleachBit + 7-Zip",
            "BleachBit,Cleanup,desktop,,System cleaner,true,true,age + BleachBit + 7-Zip",
            "7-Zip,Archive,desktop,,Archive manager,true,true,age + BleachBit + 7-Zip",
            "LibreOffice,Office,desktop,,Office suite,true,true,age + Audacity + 7-Zip + LibreOffice"
          )

          $StatePath = ".\PowerGorilla\data\processed\dashboard-state.json"

          @{
            generatedAt = (Get-Date).ToString("o")
            source = "github-actions-ci"
            safety = @{
              mode = "ci-safe"
              destructiveActionsTriggered = $false
              previewOnly = $true
              realUserDataIncluded = $false
            }
            apps = @(
              @{ name = "Audacity"; category = "Audio"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "Blender"; category = "Design"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "GitHub"; category = "Development"; type = "online"; launchUrl = "https://github.com"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "Vercel"; category = "Frontend"; type = "online"; launchUrl = "https://vercel.com"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "Supabase"; category = "Backend"; type = "online"; launchUrl = "https://supabase.com"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "Ollama"; category = "AI"; type = "local"; launchUrl = "http://localhost:11434"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "age"; category = "Security"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "BleachBit"; category = "Cleanup"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "7-Zip"; category = "Archive"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "LibreOffice"; category = "Office"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true }
            )
            workflows = @(
              @{ name = "Audacity + Blender"; apps = @("Audacity", "Blender"); safeToLaunch = $true },
              @{ name = "GitHub + Vercel"; apps = @("GitHub", "Vercel"); safeToLaunch = $true },
              @{ name = "age + BleachBit + 7-Zip"; apps = @("age", "BleachBit", "7-Zip"); safeToLaunch = $true },
              @{ name = "age + Audacity + 7-Zip + LibreOffice"; apps = @("age", "Audacity", "7-Zip", "LibreOffice"); safeToLaunch = $true }
            )
            integrations = @()
            commands = @()
            icons = @()
            categories = @("Audio", "Design", "Development", "Frontend", "Backend", "AI", "Security", "Cleanup", "Archive", "Office")
            warnings = @("CI created safe sample data because generated local data is not committed.")
          } | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $StatePath -Encoding UTF8

          pwsh -NoProfile -Command "Set-StrictMode -Version 2.0; .\PowerGorilla\scripts\Validate-PowerGorilla.ps1 -RefreshData -ExtractIcons | Out-Null"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powergorilla-validation-report
          path: PowerGorilla/reports/*.json
