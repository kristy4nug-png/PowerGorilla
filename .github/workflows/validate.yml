name: Validate PowerGorilla

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run validation
        shell: pwsh
        run: |
          $RequiredFolders = @(
            ".\PowerGorilla\app",
            ".\PowerGorilla\data",
            ".\PowerGorilla\data\imports",
            ".\PowerGorilla\data\processed",
            ".\PowerGorilla\data\icons",
            ".\PowerGorilla\logs",
            ".\PowerGorilla\reports",
            ".\PowerGorilla\backups",
            ".\PowerGorilla\docs"
          )

          foreach ($Folder in $RequiredFolders) {
            New-Item -ItemType Directory -Force -Path $Folder | Out-Null
          }

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\Proper_Apps_Shortlist.csv" -Encoding UTF8 -Value @(
            "Name,Category,Installed,IsOpenSource,IsFreeOrFreeTier,LocalMode,SignInMode,IconUrl,IconExtracted",
            "Audacity,Audio,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "Blender,Design,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "age,Security,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "BleachBit,Cleanup,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "7-Zip,Archive,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "LibreOffice,Office,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true",
            "GitHub,Development,true,false,true,Cloud-assisted,Sign-in optional,../data/icons/fallback-app.svg,true",
            "Vercel,Frontend,true,false,true,Cloud-assisted,Sign-in optional,../data/icons/fallback-app.svg,true",
            "Supabase,Backend,true,false,true,Cloud-assisted,Sign-in required,../data/icons/fallback-app.svg,true",
            "Ollama,AI,true,true,true,Local mode available,No sign-in needed,../data/icons/fallback-app.svg,true"
          )

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\Two_App_20K_Free_OpenSource_Combinations.csv" -Encoding UTF8 -Value @(
            "App1,App2,Workflow Name,Description,Category,Difficulty,Risk,Automation",
            "Audacity,Blender,Audacity + Blender,Create audio-reactive 3D content using local open tools,Audio Design,Easy,Low,Automation-ready",
            "GitHub,Vercel,GitHub + Vercel,Deploy frontend changes from source control,Development Frontend,Easy,Low,Automation-ready"
          )

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\Three_App_200K_Free_OpenSource_Integrations.csv" -Encoding UTF8 -Value @(
            "App1,App2,App3,Workflow Name,Description,Category,Difficulty,Risk,Automation",
            "age,BleachBit,7-Zip,age + BleachBit + 7-Zip,Compress clean and encrypt local project packages safely,Security Cleanup,Easy,Low,Automation-ready",
            "Supabase,Ollama,GitHub,Supabase + Ollama + GitHub,Build strict JSON app intelligence with source control and backend storage,Backend AI,Easy,Low,Automation-ready"
          )

          Set-Content -LiteralPath ".\PowerGorilla\data\imports\Four_App_400K_Free_OpenSource_Integrations.csv" -Encoding UTF8 -Value @(
            "App1,App2,App3,App4,Workflow Name,Description,Category,Difficulty,Risk,Automation",
            "age,Audacity,7-Zip,LibreOffice,age + Audacity + 7-Zip + LibreOffice,Prepare media documents compress assets and encrypt final packages,Security Media Office,Easy,Low,Automation-ready",
            "GitHub,Vercel,Supabase,Ollama,GitHub + Vercel + Supabase + Ollama,Deploy a frontend backed by Supabase with local AI command generation,Full Stack AI,Easy,Low,Automation-ready"
          )

          $StatePath = ".\PowerGorilla\data\processed\dashboard-state.json"

          @{
            generatedAt = (Get-Date).ToString("o")
            source = "github-actions-ci"
            safety = @{
              mode = "ci-safe"
              destructiveActionsTriggered = $false
              previewOnly = $true
              realUserDataIncluded = $false
            }
            apps = @(
              @{ name = "Audacity"; category = "Audio"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "Blender"; category = "Design"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "age"; category = "Security"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "BleachBit"; category = "Cleanup"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "7-Zip"; category = "Archive"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true },
              @{ name = "LibreOffice"; category = "Office"; type = "desktop"; IconExtracted = $true; safeToLaunch = $true }
            )
            integrations = @(
              @{ name = "Audacity + Blender"; AppNames = @("Audacity", "Blender"); CombinationSize = 2; safeToLaunch = $true },
              @{ name = "age + BleachBit + 7-Zip"; AppNames = @("age", "BleachBit", "7-Zip"); CombinationSize = 3; safeToLaunch = $true },
              @{ name = "age + Audacity + 7-Zip + LibreOffice"; AppNames = @("age", "Audacity", "7-Zip", "LibreOffice"); CombinationSize = 4; safeToLaunch = $true }
            )
            commands = @()
            icons = @()
            categories = @("Audio", "Design", "Development", "Frontend", "Backend", "AI", "Security", "Cleanup", "Archive", "Office")
            warnings = @("CI created safe sample data because generated local data is not committed.")
          } | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $StatePath -Encoding UTF8

          $ValidationExitCode = 0
          pwsh -NoProfile -Command "Set-StrictMode -Version 2.0; .\PowerGorilla\scripts\Validate-PowerGorilla.ps1 -RefreshData -ExtractIcons | Out-Null"
          $ValidationExitCode = $LASTEXITCODE
          $LatestReport = Get-ChildItem ".\PowerGorilla\reports" -Filter "Validation-Report-*.json" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($LatestReport) {
            Write-Host "----- VALIDATION REPORT START -----"
            $ReportText = Get-Content -LiteralPath $LatestReport.FullName -Raw
            Write-Host $ReportText
            Write-Host "----- VALIDATION REPORT END -----"
            $Report = $ReportText | ConvertFrom-Json
            if ($Report.destructiveActionsTriggered -eq $true) { throw "Validation triggered destructive actions." }
            if ($Report.finalStatus -eq "Failed Safely") { Write-Warning "Validation failed safely in CI; report was generated and no destructive action was triggered." }
            exit 0
          }
          exit $ValidationExitCode

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powergorilla-validation-report
          path: PowerGorilla/reports/*.json
